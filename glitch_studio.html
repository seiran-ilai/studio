<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLITCH STUDIO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap');

:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --border: #2a2a2a;
  --text: #e8e8e0;
  --muted: #666;
  --accent: #ff2244;
  --accent2: #00ffcc;
  --film: #f5c842;
  --tech: #00e5ff;
  --horror: #8b00ff;
  --retro: #ff6b00;
  --blood: #cc0000;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Share Tech Mono', monospace; overflow-x:hidden; }

/* Scanlines overlay */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
  pointer-events:none;
  z-index:9999;
}

header {
  border-bottom:1px solid var(--border);
  padding:20px 40px;
  display:flex;
  align-items:baseline;
  gap:20px;
}
.logo {
  font-family:'Bebas Neue', sans-serif;
  font-size:36px;
  letter-spacing:6px;
  color:var(--text);
  position:relative;
}
.logo::before {
  content:'GLITCH';
  position:absolute;
  top:0;left:0;
  color:var(--accent);
  clip-path:inset(0 0 60% 0);
  transform:translateX(2px);
  opacity:0.7;
}
.logo::after {
  content:'GLITCH';
  position:absolute;
  top:0;left:0;
  color:var(--accent2);
  clip-path:inset(60% 0 0 0);
  transform:translateX(-2px);
  opacity:0.5;
}
.logo-sub {
  font-size:11px;
  letter-spacing:4px;
  color:var(--muted);
  text-transform:uppercase;
}
.status-dot {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:var(--muted);
  letter-spacing:2px;
}
.dot {
  width:7px;height:7px;border-radius:50%;
  background:var(--accent2);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.2} }

.main-layout {
  display:grid;
  grid-template-columns:1fr 340px;
  gap:0;
  height:calc(100vh - 77px);
}

/* LEFT: Canvas area */
.canvas-area {
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:30px;
  position:relative;
  overflow:hidden;
}

.drop-zone {
  width:100%;
  max-width:600px;
  aspect-ratio:4/3;
  border:1.5px dashed var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  cursor:pointer;
  transition:border-color 0.2s;
  position:relative;
  overflow:hidden;
  background:#111;
}
.drop-zone:hover { border-color:var(--muted); }
.drop-zone.has-image { border-style:solid; border-color:var(--border); }
.drop-zone.dragover { border-color:var(--accent2); }

.drop-icon {
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;
  color:#2a2a2a;
  letter-spacing:4px;
}
.drop-text { font-size:12px; color:var(--muted); letter-spacing:3px; }
.drop-hint { font-size:10px; color:#333; letter-spacing:2px; }

#mainCanvas {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  display:none;
}

.canvas-info {
  display:flex;
  gap:20px;
  font-size:10px;
  color:var(--muted);
  letter-spacing:2px;
}
.info-item span { color:var(--text); }

/* RIGHT: Controls */
.controls {
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.controls::-webkit-scrollbar { width:3px; }
.controls::-webkit-scrollbar-thumb { background:var(--border); }

.ctrl-section {
  padding:24px 20px;
  border-bottom:1px solid var(--border);
}
.ctrl-label {
  font-size:10px;
  letter-spacing:4px;
  color:var(--muted);
  margin-bottom:16px;
  text-transform:uppercase;
}

/* Effect buttons */
.effect-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.effect-btn {
  padding:12px 8px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  text-align:center;
  transition:all 0.15s;
  position:relative;
  overflow:hidden;
}
.effect-btn::before {
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 0.15s;
}
.effect-btn:hover::before { opacity:1; }
.effect-btn.active { border-width:2px; }

.effect-btn .e-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  letter-spacing:3px;
  display:block;
  margin-bottom:2px;
}
.effect-btn .e-tag {
  font-size:9px;
  letter-spacing:2px;
  color:var(--muted);
}

/* Film */
.eff-film { --c:#f5c842; }
.eff-film::before { background:rgba(245,200,66,0.06); }
.eff-film .e-name { color:#f5c842; }
.eff-film.active { border-color:#f5c842; background:rgba(245,200,66,0.05); }

/* Tech */
.eff-tech { --c:#00e5ff; }
.eff-tech::before { background:rgba(0,229,255,0.06); }
.eff-tech .e-name { color:#00e5ff; }
.eff-tech.active { border-color:#00e5ff; background:rgba(0,229,255,0.05); }

/* Horror */
.eff-horror { --c:#8b00ff; }
.eff-horror::before { background:rgba(139,0,255,0.08); }
.eff-horror .e-name { color:#8b00ff; }
.eff-horror.active { border-color:#8b00ff; background:rgba(139,0,255,0.05); }

/* Retro */
.eff-retro { --c:#ff6b00; }
.eff-retro::before { background:rgba(255,107,0,0.06); }
.eff-retro .e-name { color:#ff6b00; }
.eff-retro.active { border-color:#ff6b00; background:rgba(255,107,0,0.05); }

/* Blood */
.eff-blood { --c:#cc0000; }
.eff-blood::before { background:rgba(204,0,0,0.06); }
.eff-blood .e-name { color:#cc0000; }
.eff-blood.active { border-color:#cc0000; background:rgba(204,0,0,0.05); }

/* Intensity slider */
.slider-row {
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:8px;
}
.slider-row label { font-size:10px; color:var(--muted); letter-spacing:2px; white-space:nowrap; }
.slider-row input[type=range] {
  flex:1;
  -webkit-appearance:none;
  height:2px;
  background:var(--border);
  outline:none;
  cursor:pointer;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--text);
  cursor:pointer;
  border:2px solid var(--bg);
  box-shadow:0 0 0 1px var(--border);
}
.slider-val {
  font-size:11px;
  color:var(--text);
  min-width:28px;
  text-align:right;
}

/* Preview toggle */
.preview-toggle {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:14px;
  cursor:pointer;
  user-select:none;
}
.toggle-track {
  width:36px;height:18px;
  border:1px solid var(--border);
  border-radius:9px;
  position:relative;
  background:transparent;
  transition:border-color 0.2s;
}
.toggle-thumb {
  position:absolute;
  top:2px;left:2px;
  width:12px;height:12px;
  border-radius:50%;
  background:var(--muted);
  transition:all 0.2s;
}
.preview-toggle.on .toggle-track { border-color:var(--accent2); }
.preview-toggle.on .toggle-thumb { left:20px; background:var(--accent2); }
.toggle-label { font-size:10px; letter-spacing:3px; color:var(--muted); }
.preview-toggle.on .toggle-label { color:var(--accent2); }

/* Export */
.export-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.export-btn {
  padding:14px 8px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  text-align:center;
  transition:all 0.2s;
  font-family:'Share Tech Mono',monospace;
  color:var(--text);
  font-size:11px;
  letter-spacing:3px;
  position:relative;
  overflow:hidden;
}
.export-btn:hover:not(:disabled) { border-color:var(--text); background:rgba(255,255,255,0.03); }
.export-btn:active:not(:disabled) { transform:scale(0.98); }
.export-btn:disabled { opacity:0.3; cursor:not-allowed; }
.export-btn .btn-format {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:4px;
  display:block;
  margin-bottom:2px;
}
.export-btn.gif-btn .btn-format { color:var(--accent2); }
.export-btn.mp4-btn .btn-format { color:var(--accent); }

/* Progress */
.progress-bar {
  width:100%;
  height:2px;
  background:var(--border);
  margin-top:12px;
  position:relative;
  overflow:hidden;
  display:none;
}
.progress-fill {
  height:100%;
  background:var(--accent2);
  width:0%;
  transition:width 0.1s;
}
.progress-text {
  font-size:10px;
  color:var(--muted);
  letter-spacing:2px;
  margin-top:8px;
  display:none;
  text-align:center;
}

/* Upload button */
.upload-btn {
  display:inline-block;
  padding:10px 20px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:3px;
  color:var(--muted);
  transition:all 0.2s;
}
.upload-btn:hover { border-color:var(--text); color:var(--text); }

#fileInput { display:none; }

/* Duration control */
.dur-row {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.dur-btn {
  padding:6px 14px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  transition:all 0.15s;
}
.dur-btn:hover { border-color:var(--muted); color:var(--text); }
.dur-btn.active { border-color:var(--text); color:var(--text); }

/* Frame counter */
.frame-counter {
  font-size:10px;
  color:var(--muted);
  letter-spacing:2px;
  margin-top:8px;
}

/* Noise description */
.effect-desc {
  font-size:10px;
  color:var(--muted);
  letter-spacing:1px;
  line-height:1.6;
  margin-top:8px;
  min-height:32px;
  border-left:2px solid var(--border);
  padding-left:10px;
}
</style>
</head>
<body>

<header>
  <div class="logo">GLITCH</div>
  <div>
    <div style="font-family:'Bebas Neue';font-size:13px;letter-spacing:6px;color:var(--muted)">STUDIO</div>
    <div class="logo-sub">NOISE EFFECT GENERATOR</div>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    SYSTEM READY
  </div>
</header>

<div class="main-layout">
  <!-- Canvas -->
  <div class="canvas-area">
    <div class="drop-zone" id="dropZone">
      <canvas id="mainCanvas"></canvas>
      <div id="dropContent">
        <div class="drop-icon">UPLOAD</div>
        <div class="drop-text">拖拉圖片 / 點擊上傳</div>
        <div class="drop-hint">JPG · PNG · WEBP · GIF</div>
        <br>
        <label for="fileInput" class="upload-btn">CHOOSE FILE</label>
        <input type="file" id="fileInput" accept="image/*">
      </div>
    </div>
    <div class="canvas-info">
      <div>尺寸：<span id="infoSize">—</span></div>
      <div>特效：<span id="infoEffect">—</span></div>
      <div>強度：<span id="infoIntensity">—</span></div>
      <div>幀數：<span id="infoFrames">—</span></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- Effects -->
    <div class="ctrl-section">
      <div class="ctrl-label">// 選擇特效</div>
      <div class="effect-grid">
        <button class="effect-btn eff-film active" data-effect="film">
          <span class="e-name">FILM</span>
          <span class="e-tag">電影感</span>
        </button>
        <button class="effect-btn eff-tech" data-effect="tech">
          <span class="e-name">CYBER</span>
          <span class="e-tag">未來科技感</span>
        </button>
        <button class="effect-btn eff-horror" data-effect="horror">
          <span class="e-name">HORROR</span>
          <span class="e-tag">恐怖感</span>
        </button>
        <button class="effect-btn eff-retro" data-effect="retro">
          <span class="e-name">RETRO</span>
          <span class="e-tag">復古感</span>
        </button>
        <button class="effect-btn eff-blood" data-effect="blood" style="grid-column:1/-1">
          <span class="e-name">BLOOD</span>
          <span class="e-tag">血腥感</span>
        </button>
      </div>
      <div class="effect-desc" id="effectDesc">
        粒子感映像管噪點、膠片刮痕、光暈色差，重現電影老底片質感。
      </div>
    </div>

    <!-- Intensity -->
    <div class="ctrl-section">
      <div class="ctrl-label">// 強度設定</div>
      <div class="slider-row">
        <label>INTENSITY</label>
        <input type="range" id="intensitySlider" min="1" max="10" value="5" step="1">
        <span class="slider-val" id="intensityVal">5</span>
      </div>
      <div class="slider-row" style="margin-top:12px;">
        <label>SPEED</label>
        <input type="range" id="speedSlider" min="1" max="10" value="5" step="1">
        <span class="slider-val" id="speedVal">5</span>
      </div>
      <div class="preview-toggle on" id="previewToggle">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
        <div class="toggle-label">LIVE PREVIEW</div>
      </div>
    </div>

    <!-- Duration -->
    <div class="ctrl-section">
      <div class="ctrl-label">// 輸出長度</div>
      <div class="dur-row">
        <button class="dur-btn active" data-dur="2">2s</button>
        <button class="dur-btn" data-dur="3">3s</button>
        <button class="dur-btn" data-dur="5">5s</button>
        <button class="dur-btn" data-dur="8">8s</button>
      </div>
      <div class="frame-counter" id="frameCounter">預計 24 幀 @ 12fps</div>
    </div>

    <!-- Export -->
    <div class="ctrl-section">
      <div class="ctrl-label">// 輸出格式</div>
      <div class="export-grid">
        <button class="export-btn gif-btn" id="exportGif" disabled>
          <span class="btn-format">GIF</span>
          <span>動態圖片</span>
        </button>
        <button class="export-btn mp4-btn" id="exportMp4" disabled>
          <span class="btn-format">MP4</span>
          <span>影片檔案</span>
        </button>
      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">PROCESSING...</div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let sourceImage = null;
let currentEffect = 'film';
let intensity = 5;
let speed = 5;
let duration = 2;
let livePreview = true;
let animFrame = null;
let frameCount = 0;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const dropZone = document.getElementById('dropZone');
const dropContent = document.getElementById('dropContent');

// ─────────────────────────────────────────────
// Upload / Drop
// ─────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  if(e.target.files[0]) loadImage(e.target.files[0]);
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if(e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});
dropZone.addEventListener('click', e => {
  if(e.target.tagName !== 'LABEL' && e.target.tagName !== 'INPUT') {
    if(!sourceImage) document.getElementById('fileInput').click();
  }
});

function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    sourceImage = img;
    // Size canvas to fit, max 800x600
    const maxW = dropZone.clientWidth, maxH = dropZone.clientHeight;
    const scale = Math.min(maxW/img.width, maxH/img.height, 1);
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.style.display = 'block';
    dropContent.style.display = 'none';
    dropZone.classList.add('has-image');
    document.getElementById('exportGif').disabled = false;
    document.getElementById('exportMp4').disabled = false;
    document.getElementById('infoSize').textContent = `${canvas.width}×${canvas.height}`;
    startLivePreview();
  };
  img.src = url;
}

// ─────────────────────────────────────────────
// Effect Controls
// ─────────────────────────────────────────────
const descs = {
  film: '粒子感映像管噪點、膠片刮痕、光暈色差，重現電影老底片質感。',
  tech: '數位像素錯位、RGB 色差掃描線、Hex 碼浮現，未來賽博龐克美學。',
  horror: '黑暗邊緣侵蝕、扭曲波紋、閃爍白光，深淵凝視你的感官。',
  retro: 'VHS 磁帶橫紋、色彩溢出、類比訊號失真，80年代錄影帶記憶。',
  blood: '深紅液體滴落、肉眼靜脈紋理、傷口裂縫侵入畫面。'
};

document.querySelectorAll('.effect-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentEffect = btn.dataset.effect;
    document.getElementById('effectDesc').textContent = descs[currentEffect];
    document.getElementById('infoEffect').textContent = currentEffect.toUpperCase();
  });
});

document.getElementById('intensitySlider').addEventListener('input', e => {
  intensity = +e.target.value;
  document.getElementById('intensityVal').textContent = intensity;
  document.getElementById('infoIntensity').textContent = intensity;
});
document.getElementById('speedSlider').addEventListener('input', e => {
  speed = +e.target.value;
  document.getElementById('speedVal').textContent = speed;
});

document.getElementById('previewToggle').addEventListener('click', function() {
  livePreview = !livePreview;
  this.classList.toggle('on', livePreview);
  if(livePreview && sourceImage) startLivePreview();
  else { cancelAnimationFrame(animFrame); if(sourceImage) drawFrame(ctx, canvas.width, canvas.height, 0); }
});

document.querySelectorAll('.dur-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    duration = +this.dataset.dur;
    updateFrameCounter();
  });
});

function updateFrameCounter() {
  const fps = 12;
  const frames = duration * fps;
  document.getElementById('frameCounter').textContent = `預計 ${frames} 幀 @ ${fps}fps`;
  document.getElementById('infoFrames').textContent = frames;
}
updateFrameCounter();
document.getElementById('infoEffect').textContent = 'FILM';
document.getElementById('infoIntensity').textContent = '5';

// ─────────────────────────────────────────────
// Drawing Engine
// ─────────────────────────────────────────────
function drawFrame(targetCtx, w, h, t) {
  if(!sourceImage) return;
  targetCtx.clearRect(0,0,w,h);
  targetCtx.drawImage(sourceImage, 0, 0, w, h);

  switch(currentEffect) {
    case 'film':   applyFilm(targetCtx, w, h, t); break;
    case 'tech':   applyTech(targetCtx, w, h, t); break;
    case 'horror': applyHorror(targetCtx, w, h, t); break;
    case 'retro':  applyRetro(targetCtx, w, h, t); break;
    case 'blood':  applyBlood(targetCtx, w, h, t); break;
  }
}

const iScale = () => intensity / 5; // 0.2 – 2.0

// ── FILM ──────────────────────────────────────
function applyFilm(ctx, w, h, t) {
  const s = iScale();
  // Grain
  const id = ctx.getImageData(0,0,w,h);
  const d = id.data;
  const grainAmt = 35 * s;
  for(let i=0; i<d.length; i+=4) {
    const g = (Math.random()-0.5)*grainAmt;
    d[i]   = clamp(d[i]+g);
    d[i+1] = clamp(d[i+1]+g);
    d[i+2] = clamp(d[i+2]+g);
  }
  ctx.putImageData(id, 0, 0);

  // Vignette
  const vig = ctx.createRadialGradient(w/2,h/2,h*0.2,w/2,h/2,h*0.85);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,`rgba(0,0,0,${0.5*s})`);
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,w,h);

  // Scratch
  if(Math.random() < 0.25*s) {
    const sx = Math.random()*w;
    ctx.strokeStyle = `rgba(255,255,220,${0.3+Math.random()*0.5})`;
    ctx.lineWidth = Math.random()<0.5 ? 0.5 : 1;
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx + (Math.random()-0.5)*6, h);
    ctx.stroke();
  }

  // Warm tone overlay
  ctx.fillStyle = `rgba(245,180,60,${0.06*s})`;
  ctx.fillRect(0,0,w,h);

  // Slight RGB shift
  const shift = Math.round(2*s);
  const imgData = ctx.getImageData(0,0,w,h);
  const out = new ImageData(w,h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++) {
    const i = (y*w+x)*4;
    const ri = (y*w+Math.min(x+shift,w-1))*4;
    const bi = (y*w+Math.max(x-shift,0))*4;
    out.data[i]   = imgData.data[ri];
    out.data[i+1] = imgData.data[i+1];
    out.data[i+2] = imgData.data[bi+2];
    out.data[i+3] = 255;
  }
  ctx.putImageData(out,0,0);

  // Film frame line
  if(t % 8 < 2) {
    ctx.fillStyle = `rgba(255,240,200,${0.03*s})`;
    ctx.fillRect(0,0,w,h);
  }
}

// ── TECH ──────────────────────────────────────
function applyTech(ctx, w, h, t) {
  const s = iScale();
  // Horizontal scan glitch lines
  const numLines = Math.floor(3 * s);
  for(let i=0;i<numLines;i++) {
    if(Math.random() < 0.6) {
      const y = Math.floor(Math.random()*h);
      const lh = Math.floor(1+Math.random()*6);
      const offset = Math.floor((Math.random()-0.5)*30*s);
      const id = ctx.getImageData(0, y, w, lh);
      ctx.putImageData(id, offset, y);
      // Color shift for the glitch strip
      ctx.fillStyle = `rgba(0,229,255,${0.1+Math.random()*0.15})`;
      ctx.fillRect(0, y, w, lh);
    }
  }

  // RGB split
  const rShift = Math.round(4*s);
  const id = ctx.getImageData(0,0,w,h);
  const out = new ImageData(w,h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++) {
    const i = (y*w+x)*4;
    const rx = clampVal(x+rShift, 0, w-1);
    const bx = clampVal(x-rShift, 0, w-1);
    out.data[i]   = id.data[(y*w+rx)*4];
    out.data[i+1] = id.data[i+1];
    out.data[i+2] = id.data[(y*w+bx)*4+2];
    out.data[i+3] = 255;
  }
  ctx.putImageData(out,0,0);

  // Scanlines
  for(let y=0;y<h;y+=3) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0,y,w,1);
  }

  // Cyan glow overlay
  ctx.fillStyle = `rgba(0,229,255,${0.04*s})`;
  ctx.fillRect(0,0,w,h);

  // HEX text overlay
  ctx.fillStyle = `rgba(0,229,255,${0.18*s})`;
  ctx.font = `${8+s*2}px 'Share Tech Mono',monospace`;
  const hexChars = '0123456789ABCDEF';
  if(Math.random()<0.4*s) {
    for(let i=0;i<4;i++) {
      const hx = Array.from({length:8},()=>hexChars[Math.floor(Math.random()*16)]).join('');
      ctx.fillText(hx, Math.random()*w*0.7, 20+Math.random()*(h-40));
    }
  }

  // Corner brackets
  ctx.strokeStyle = `rgba(0,229,255,${0.5*s})`;
  ctx.lineWidth = 1.5;
  const bSize = 20;
  [[0,0],[w-bSize,0],[0,h-bSize],[w-bSize,h-bSize]].forEach(([bx,by]) => {
    ctx.beginPath();
    if(bx<w/2 && by<h/2){ ctx.moveTo(bx,by+bSize);ctx.lineTo(bx,by);ctx.lineTo(bx+bSize,by); }
    else if(bx>w/2 && by<h/2){ ctx.moveTo(bx,by);ctx.lineTo(bx+bSize,by);ctx.moveTo(bx+bSize,by);ctx.lineTo(bx+bSize,by+bSize); }
    else if(bx<w/2){ ctx.moveTo(bx,by);ctx.lineTo(bx,by+bSize);ctx.moveTo(bx,by+bSize);ctx.lineTo(bx+bSize,by+bSize); }
    else { ctx.moveTo(bx+bSize,by);ctx.lineTo(bx+bSize,by+bSize);ctx.lineTo(bx,by+bSize); }
    ctx.stroke();
  });
}

// ── HORROR ────────────────────────────────────
function applyHorror(ctx, w, h, t) {
  const s = iScale();

  // Desaturate + darken
  const id = ctx.getImageData(0,0,w,h);
  const d = id.data;
  for(let i=0;i<d.length;i+=4) {
    const avg = (d[i]+d[i+1]+d[i+2])/3;
    const mix = 0.6*s;
    d[i]   = clamp(d[i]*(1-mix) + avg*mix);
    d[i+1] = clamp(d[i+1]*(1-mix) + avg*mix * 0.85);
    d[i+2] = clamp(d[i+2]*(1-mix) + avg*mix * 0.85);
    // grain
    const g = (Math.random()-0.5)*20*s;
    d[i]   = clamp(d[i]+g);
    d[i+1] = clamp(d[i+1]+g*0.8);
    d[i+2] = clamp(d[i+2]+g*0.8);
  }
  ctx.putImageData(id, 0,0);

  // Heavy vignette
  const vig = ctx.createRadialGradient(w/2,h/2,h*0.1,w/2,h/2,h*0.7);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,`rgba(0,0,0,${0.7*s})`);
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,w,h);

  // Distortion wave
  const waveImg = ctx.getImageData(0,0,w,h);
  const wOut = new ImageData(w,h);
  const amp = 4*s;
  const freq = 0.05;
  for(let y=0;y<h;y++) {
    const dx = Math.round(Math.sin(y*freq + t*0.3)*amp);
    for(let x=0;x<w;x++) {
      const sx = clampVal(x+dx,0,w-1);
      const si = (y*w+sx)*4, di = (y*w+x)*4;
      wOut.data[di]=waveImg.data[si]; wOut.data[di+1]=waveImg.data[si+1];
      wOut.data[di+2]=waveImg.data[si+2]; wOut.data[di+3]=255;
    }
  }
  ctx.putImageData(wOut,0,0);

  // Flicker
  if(Math.random() < 0.15*s) {
    ctx.fillStyle = `rgba(0,0,0,${0.4+Math.random()*0.4})`;
    ctx.fillRect(0,0,w,h);
  }

  // Purple tint
  ctx.fillStyle = `rgba(80,0,120,${0.08*s})`;
  ctx.fillRect(0,0,w,h);
}

// ── RETRO ─────────────────────────────────────
function applyRetro(ctx, w, h, t) {
  const s = iScale();

  // VHS color bleed
  const id = ctx.getImageData(0,0,w,h);
  const d = id.data;
  for(let i=0;i<d.length;i+=4) {
    // Warm shift
    d[i]   = clamp(d[i]*1.1);
    d[i+1] = clamp(d[i+1]*0.95);
    d[i+2] = clamp(d[i+2]*0.85);
  }
  ctx.putImageData(id,0,0);

  // Horizontal noise lines
  const numBands = Math.floor(5*s);
  for(let i=0;i<numBands;i++) {
    const y = Math.floor(Math.random()*h);
    const bh = Math.floor(1+Math.random()*3);
    const bId = ctx.getImageData(0,y,w,bh);
    const bd = bId.data;
    for(let j=0;j<bd.length;j+=4) {
      bd[j]   = clamp(bd[j] + (Math.random()-0.5)*80*s);
      bd[j+1] = clamp(bd[j+1] + (Math.random()-0.5)*40*s);
      bd[j+2] = clamp(bd[j+2] + (Math.random()-0.5)*30*s);
    }
    ctx.putImageData(bId, Math.floor((Math.random()-0.5)*20*s), y);
  }

  // Scanlines (thicker VHS style)
  for(let y=0;y<h;y+=2) {
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0,y,w,1);
  }

  // Color ghost (horizontal offset duplicate)
  const ghostShift = Math.round(8*s);
  const ghost = ctx.getImageData(0,0,w,h);
  const gOut = new ImageData(w,h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++) {
    const i = (y*w+x)*4;
    const gx = clampVal(x-ghostShift,0,w-1);
    gOut.data[i]   = ghost.data[(y*w+gx)*4];
    gOut.data[i+1] = ghost.data[i+1];
    gOut.data[i+2] = ghost.data[i+2];
    gOut.data[i+3] = 255;
  }
  ctx.globalAlpha = 0.25*s;
  const tmpC = document.createElement('canvas');
  tmpC.width=w; tmpC.height=h;
  tmpC.getContext('2d').putImageData(gOut,0,0);
  ctx.drawImage(tmpC,0,0);
  ctx.globalAlpha = 1;

  // Warm overlay + noise
  ctx.fillStyle = `rgba(255,100,0,${0.07*s})`;
  ctx.fillRect(0,0,w,h);

  // VHS timestamp
  ctx.fillStyle = `rgba(255,200,50,${0.7*s})`;
  ctx.font = `bold ${10+s}px 'Courier Prime',monospace`;
  const now = new Date();
  ctx.fillText(`REC  ${now.toLocaleDateString()}  ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`, 8, h-10);
}

// ── BLOOD ─────────────────────────────────────
function applyBlood(ctx, w, h, t) {
  const s = iScale();

  // Dark red tint
  const id = ctx.getImageData(0,0,w,h);
  const d = id.data;
  for(let i=0;i<d.length;i+=4) {
    d[i]   = clamp(d[i]*1.15);
    d[i+1] = clamp(d[i+1]*0.7);
    d[i+2] = clamp(d[i+2]*0.6);
    const g = (Math.random()-0.5)*15*s;
    d[i]+=g; d[i+1]+=g*0.5; d[i+2]+=g*0.5;
  }
  ctx.putImageData(id,0,0);

  // Blood drips
  ctx.save();
  const numDrips = Math.floor(3 + 4*s);
  for(let i=0;i<numDrips;i++) {
    const dx = Math.random()*w;
    const startY = Math.random()*h*0.3;
    const dripLen = (30+Math.random()*80)*s;
    const dripW = 1+Math.random()*3*s;
    const alpha = 0.4+Math.random()*0.5;

    // Main drip
    const g = ctx.createLinearGradient(dx,startY,dx,startY+dripLen);
    g.addColorStop(0,`rgba(180,0,0,0)`);
    g.addColorStop(0.3,`rgba(160,0,0,${alpha})`);
    g.addColorStop(1,`rgba(120,0,0,${alpha*0.8})`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(dx, startY+dripLen*0.6, dripW/2, dripLen/2, 0, 0, Math.PI*2);
    ctx.fill();

    // Drip tip
    ctx.fillStyle = `rgba(140,0,0,${alpha*0.9})`;
    ctx.beginPath();
    ctx.arc(dx, startY+dripLen, dripW*0.7, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Cracks / veins
  ctx.strokeStyle = `rgba(120,0,0,${0.4*s})`;
  ctx.lineWidth = 0.5+s*0.5;
  for(let i=0;i<Math.floor(3*s);i++) {
    const sx = Math.random()*w, sy = Math.random()*h;
    ctx.beginPath(); ctx.moveTo(sx,sy);
    let cx=sx, cy=sy;
    for(let j=0;j<6;j++) {
      cx += (Math.random()-0.5)*40; cy += (Math.random()-0.5)*30;
      ctx.lineTo(cx,cy);
    }
    ctx.stroke();
  }

  // Dark vignette with red edge
  const vig = ctx.createRadialGradient(w/2,h/2,h*0.15,w/2,h/2,h*0.75);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(0.7,`rgba(60,0,0,${0.3*s})`);
  vig.addColorStop(1,`rgba(80,0,0,${0.7*s})`);
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,w,h);

  // Flicker
  if(Math.random() < 0.1*s) {
    ctx.fillStyle = `rgba(100,0,0,${0.2*Math.random()})`;
    ctx.fillRect(0,0,w,h);
  }
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function clamp(v){ return Math.max(0,Math.min(255,Math.round(v))); }
function clampVal(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

// ─────────────────────────────────────────────
// Live Preview Loop
// ─────────────────────────────────────────────
function startLivePreview() {
  cancelAnimationFrame(animFrame);
  let t = 0;
  const fps = 12 + speed;
  let lastTime = 0;
  const interval = 1000/fps;

  function loop(ts) {
    if(!livePreview || !sourceImage) return;
    if(ts - lastTime > interval) {
      drawFrame(ctx, canvas.width, canvas.height, t);
      t++;
      lastTime = ts;
    }
    animFrame = requestAnimationFrame(loop);
  }
  animFrame = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// Export
// ─────────────────────────────────────────────
const FPS = 12;

function setProgress(pct, text) {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const txt = document.getElementById('progressText');
  bar.style.display = 'block';
  txt.style.display = 'block';
  fill.style.width = pct+'%';
  txt.textContent = text;
  if(pct >= 100) {
    setTimeout(()=>{ bar.style.display='none'; txt.style.display='none'; },2000);
  }
}

function disableExport(v) {
  document.getElementById('exportGif').disabled = v;
  document.getElementById('exportMp4').disabled = v;
}

// ── GIF Export ────────────────────────────────
document.getElementById('exportGif').addEventListener('click', async () => {
  if(!sourceImage) return;
  disableExport(true);
  cancelAnimationFrame(animFrame);

  const w = canvas.width, h = canvas.height;
  const totalFrames = duration * FPS;

  setProgress(0, 'GIF 產生中...');

  const offCanvas = document.createElement('canvas');
  offCanvas.width = w; offCanvas.height = h;
  const offCtx = offCanvas.getContext('2d');

  const gif = new GIF({
    workers: 2, quality: 8, width: w, height: h, workerScript:'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
  });

  for(let f=0;f<totalFrames;f++) {
    drawFrame(offCtx, w, h, f);
    gif.addFrame(offCanvas, {copy:true, delay: Math.round(1000/FPS)});
    setProgress(Math.round(f/totalFrames*50), `渲染幀 ${f+1}/${totalFrames}`);
    await new Promise(r=>setTimeout(r,0));
  }

  gif.on('progress', p => setProgress(50 + Math.round(p*50), 'GIF 壓縮中...'));
  gif.on('finished', blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `glitch_${currentEffect}.gif`;
    a.click();
    setProgress(100, '下載完成！');
    disableExport(false);
    if(livePreview) startLivePreview();
  });
  gif.render();
});

// ── MP4 Export ────────────────────────────────
document.getElementById('exportMp4').addEventListener('click', async () => {
  if(!sourceImage) return;
  disableExport(true);
  cancelAnimationFrame(animFrame);

  const w = canvas.width, h = canvas.height;
  const totalFrames = duration * FPS;

  setProgress(0, 'MP4 產生中...');

  const offCanvas = document.createElement('canvas');
  offCanvas.width = w; offCanvas.height = h;
  const offCtx = offCanvas.getContext('2d');

  // Use MediaRecorder
  const stream = offCanvas.captureStream(FPS);
  const chunks = [];
  // Try mp4 first, fallback to webm
  const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' :
                   MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  const rec = new MediaRecorder(stream, {mimeType, videoBitsPerSecond:4000000});
  rec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
  rec.onstop = () => {
    const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';
    const blob = new Blob(chunks, {type: mimeType});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `glitch_${currentEffect}.${ext}`;
    a.click();
    setProgress(100, `下載完成！(${ext.toUpperCase()})`);
    disableExport(false);
    if(livePreview) startLivePreview();
  };

  rec.start();

  for(let f=0;f<totalFrames;f++) {
    drawFrame(offCtx, w, h, f);
    setProgress(Math.round(f/totalFrames*90), `渲染幀 ${f+1}/${totalFrames}`);
    await new Promise(r=>setTimeout(r, Math.round(1000/FPS)));
  }

  setProgress(95, '封裝中...');
  rec.stop();
});
</script>
