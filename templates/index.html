<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <meta name="description" content="Template — 上傳圖片或影片,套用音樂播放器等模板,輸出社群尺寸圖片與影片。">
  <meta property="og:title" content="Template">
  <meta property="og:description" content="上傳圖片或影片,套用模板快速創作社群素材。">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Template">
  <meta name="twitter:description" content="上傳圖片或影片,套用模板快速創作社群素材。">
  <title>Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 共用殼樣式 -->
  <link rel="stylesheet" href="index.css">
  <!-- 各模板專屬樣式(新增模板時在此加一行) -->
  <link rel="stylesheet" href="music-player/index.css">
</head>
<body>

  <!-- 手機提示:建議使用電腦瀏覽器(非阻擋) -->
  <div id="desktop-hint" role="note">
    <span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="10" rx="1"/><path d="M2 19h20"/></svg>建議使用電腦瀏覽器開啟以獲得最佳體驗</span>
    <button type="button" id="desktop-hint-close" aria-label="關閉提示">✕</button>
  </div>
  <script>
    (function () {
      var el = document.getElementById("desktop-hint");
      var mobile = (window.matchMedia && matchMedia("(pointer: coarse)").matches) || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      if (mobile) el.classList.add("show");
      document.getElementById("desktop-hint-close").addEventListener("click", function () { el.classList.remove("show"); });
    })();
  </script>

  <div class="app">

    <!-- ═ Header ═ -->
    <header class="header">
      <a class="back" href="../" aria-label="回到入口頁"><svg class="ic-back" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></a>
      <div class="logo">
        <span class="logo-main">Template</span>
        <span class="logo-sub">上傳素材 · 套用模板 · 輸出社群尺寸</span>
      </div>
      <div class="header-right">
        <span class="tpl-badge" id="tplBadge"></span>
        <button class="help-btn" id="btnSave" type="button" title="存檔(下載 .json)"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11"/><path d="M7 10l5 5 5-5"/><path d="M5 20h14"/></svg></button>
        <button class="help-btn" id="btnLoad" type="button" title="讀檔(上傳 .json)"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V9"/><path d="M7 14l5-5 5 5"/><path d="M5 4h14"/></svg></button>
        <span class="hr-sep"></span>
        <div class="ui-scale" id="uiScale" role="group" aria-label="介面大小">
          <button class="us-btn on" type="button" data-ui="std">標準</button>
          <button class="us-btn" type="button" data-ui="lg">大</button>
          <button class="us-btn" type="button" data-ui="xl">最大</button>
        </div>
        <span class="hr-sep"></span>
        <button class="help-btn" id="helpBtn" title="使用說明"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 8h.01"/></svg></button>
      </div>
    </header>
    <input type="file" id="loadFile" accept="application/json,.json" hidden>

    <div class="lay">

      <!-- ═ 左:模板選單(引擎依註冊的模板動態建立)═ -->
      <aside class="tpl-rail" id="tplRail" aria-label="模板列表">
        <div class="rail-label">模板</div>
      </aside>

      <!-- ═ 中:預覽(共用)═ -->
      <main class="stage">
        <div class="stage-meta">
          <span id="metaMedia">尚未載入素材</span>
          <span id="metaSize"></span>
        </div>
        <div id="dz" class="dropzone">
          <canvas id="cvs" width="1080" height="1350"></canvas>
          <div id="uploadPrompt" class="upload-prompt">
            <div class="up-icon" aria-hidden="true"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V8"/><path d="M6 13l6-6 6 6"/><path d="M5 21h14"/></svg></div>
            <p class="up-title">拖曳圖片或影片到這裡</p>
            <p class="up-sub">或 <button type="button" class="up-link" id="btnUpload">點擊選擇檔案</button></p>
            <p class="up-hint">支援 JPG / PNG / WebP / MP4 / WebM・基於版權考量,不提供加入音樂</p>
          </div>
        </div>

        <div class="stage-bar">
          <button id="btnReplace" class="st-btn" type="button" style="display:none;"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 0 0-14-4.5L4 9"/><path d="M4 4v5h5"/><path d="M4 13a8 8 0 0 0 14 4.5L20 15"/><path d="M20 20v-5h-5"/></svg>更換素材</button>
          <button id="btnPlayPause" class="st-btn" type="button" style="display:none;">⏸ 暫停預覽</button>
        </div>

        <!-- 匯出進度 -->
        <div class="prog" id="prog" style="display:none;">
          <div class="prog-fill" id="progFill"></div>
          <span class="prog-text" id="progText"></span>
        </div>

        <input type="file" id="fi" accept="image/*,video/mp4,video/webm,video/quicktime" hidden>
      </main>

      <!-- ═ 右:控制面板(tabs / panels 由引擎與模板動態建立)═ -->
      <div class="side">
        <div class="tabs" id="tabs" role="tablist"></div>
        <div class="panels" id="panels"></div>
      </div>

    </div>

    <!-- ═ Footer ═ -->
    <footer class="site-footer">
      <span class="footer-tool-name">Template</span>
      <span class="footer-divider" aria-hidden="true">·</span>
      <span class="footer-author">Made by ilai</span>
      <span class="footer-divider" aria-hidden="true">·</span>
      <a href="https://www.threads.com/@ilai_sei" target="_blank" rel="noopener noreferrer" aria-label="作者的 Threads 帳號 ilai_sei(個人/工具,新分頁開啟)">@ilai_sei</a>
      <span class="footer-divider" aria-hidden="true">·</span>
      <a href="https://www.threads.com/@ilainosu.ffxiv" target="_blank" rel="noopener noreferrer" aria-label="作者的 FFXIV 創作 Threads 帳號 ilainosu.ffxiv(新分頁開啟)">@ilainosu.ffxiv</a>
      <span class="footer-divider" aria-hidden="true">·</span>
      <a href="https://www.plurk.com/ilai_sei" target="_blank" rel="noopener noreferrer" aria-label="作者的 Plurk 帳號 @ilai_sei(新分頁開啟)">Plurk</a>
      <span class="footer-divider" aria-hidden="true">·</span>
      <a href="../" aria-label="回到 ilai's Studios 入口">All Studios</a>
    </footer>
  </div>

  <!-- 導覽 coach-mark -->
  <div id="tour" class="tour hidden">
    <div id="tourSpot" class="tour-spot"></div>
    <div id="tourBubble" class="tour-bubble">
      <p class="tour-text"></p>
      <div class="tour-foot">
        <span class="tour-step" id="tourStepNo"></span>
        <span class="tour-btns">
          <button class="tour-btn" id="tourSkip">跳過</button>
          <button class="tour-btn" id="tourPrev">上一步</button>
          <button class="tour-btn primary" id="tourNext">下一步</button>
        </span>
      </div>
    </div>
  </div>

  <!-- 共用引擎 -->
  <script src="index.js"></script>
  <!-- 模板(新增模板時在此加一行,模板會自行向 Engine 註冊)-->
  <script src="music-player/index.js"></script>
  <!-- 介面縮放(標準 / 大 / 最大),記憶於 localStorage -->
  <script>
    (function () {
      var KEY = "tpl-ui-scale";
      var bar = document.getElementById("uiScale");
      if (!bar) return;
      var btns = bar.querySelectorAll(".us-btn");
      var saved = localStorage.getItem(KEY) || "std";
      apply(saved);
      btns.forEach(function (b) {
        b.addEventListener("click", function () {
          apply(b.dataset.ui);
          localStorage.setItem(KEY, b.dataset.ui);
        });
      });
      function apply(v) {
        document.body.dataset.ui = v;
        btns.forEach(function (x) { x.classList.toggle("on", x.dataset.ui === v); });
      }
    })();
  </script>

  <!-- 導覽:首次自動開始,i 鈕可再開 -->
  <script>
    (function(){var KEY='templates-seen-guide';var TOUR=[
      {sel:'#dz',pos:'left',text:'先在這裡<b>上傳素材</b>：把圖片或影片拖進來，或點「點擊選擇檔案」。支援 JPG / PNG / WebP / MP4 / WebM。'},
      {sel:'.tpl-rail',pos:'right',text:'左欄選<b>模板</b>。目前提供 <b>Music Player</b>，標示 Coming Soon 的尚在製作中。'},
      {sel:'.stage',pos:'left',text:'中間是<b>預覽</b>。可直接<b>拖曳卡片</b>調位置，靠近中線或邊距會自動<b>吸附</b>。'},
      {sel:'#tabs',pos:'left',text:'右欄分頁依創作流程排列：先在<b>版面</b>選社群尺寸，接著<b>歌曲</b>填內容、<b>外觀</b>調樣式與對齊大小、<b>質感</b>玻璃材質，最後到<b>輸出</b>匯出圖片或影片。'},
      {sel:'#uiScale',pos:'bottom',text:'覺得介面太小？用「<b>標準 / 大 / 最大</b>」放大左右控制欄，方便細部操作。'},
      {sel:'#helpBtn',pos:'bottom',text:'隨時點這顆 <b>i</b> 鈕可再看一次本導覽。開始創作吧！'}
    ];
    var tour=document.getElementById('tour');if(!tour)return;var spot=document.getElementById('tourSpot'),bub=document.getElementById('tourBubble'),idx=0;
    function show(){var s=TOUR[idx],el=document.querySelector(s.sel);if(!el){if(idx<TOUR.length-1){idx++;return show();}return end();}var r=el.getBoundingClientRect(),pad=8;spot.style.left=(r.left-pad)+'px';spot.style.top=(r.top-pad)+'px';spot.style.width=(r.width+pad*2)+'px';spot.style.height=(r.height+pad*2)+'px';bub.querySelector('.tour-text').innerHTML=s.text;document.getElementById('tourStepNo').textContent=(idx+1)+' / '+TOUR.length;document.getElementById('tourPrev').style.visibility=idx?'visible':'hidden';document.getElementById('tourNext').textContent=idx===TOUR.length-1?'完成':'下一步';tour.classList.remove('hidden');pos(r,s.pos);}
    function pos(r,p){bub.style.left='-9999px';bub.style.top='0px';var bw=bub.offsetWidth,bh=bub.offsetHeight,gap=14,vw=innerWidth,vh=innerHeight,left,top,arrow;if(p==='right'){left=r.right+gap;top=r.top;arrow='left';}else if(p==='left'){left=r.left-gap-bw;top=r.top;arrow='right';}else if(p==='top'){left=r.left;top=r.top-gap-bh;arrow='bottom';}else{left=r.left;top=r.bottom+gap;arrow='top';}left=Math.max(12,Math.min(left,vw-bw-12));top=Math.max(12,Math.min(top,vh-bh-12));bub.style.left=left+'px';bub.style.top=top+'px';bub.dataset.arrow=arrow;}
    function start(){idx=0;requestAnimationFrame(function(){requestAnimationFrame(show);});}
    function end(){tour.classList.add('hidden');try{localStorage.setItem(KEY,'1');}catch(e){}}
    function next(){if(idx<TOUR.length-1){idx++;show();}else end();}function prev(){if(idx>0){idx--;show();}}
    var hb=document.getElementById('helpBtn');if(hb)hb.onclick=start;document.getElementById('tourSkip').onclick=end;document.getElementById('tourPrev').onclick=prev;document.getElementById('tourNext').onclick=next;
    tour.onclick=function(e){if(e.target.id==='tour')next();};
    document.addEventListener('keydown',function(e){if(tour.classList.contains('hidden'))return;if(e.key==='Escape')end();else if(e.key==='ArrowRight'||e.key==='Enter')next();else if(e.key==='ArrowLeft')prev();});
    window.addEventListener('resize',function(){if(!tour.classList.contains('hidden'))show();});
    try{if(!localStorage.getItem(KEY))setTimeout(start,400);}catch(e){}})();
  </script>
</body>
</html>
